<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Listings</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="Logo">
        </div>
        <nav>
            <ul>
                <li><a href="#">Find Jobs</a></li>
                <li><a href="#">Employers</a></li>
                <li><a href="#">Upload Job</a></li>
                <li><a href="#">About Us</a></li>
            </ul>
        </nav>
        <div class="user-profile">
            <span class="username">SNS</span>
            <span class="role">Life Coach</span>
            <img src="profile.jpg" alt="Profile Picture">
        </div>
    </header>

    <section class="search-section">
        
        <div class="search-container">
            <div class="search-bar">
                <div class="search-input">
                    <input type="text" placeholder="Job title or keyword">
                    <i class="fas fa-search"></i>
                </div>
                <div class="search-input">
                    <input type="text" placeholder="Add country or city">
                    <i class="fas fa-map-marker-alt"></i>
                </div>
                <button class="search-button">Search</button>
            </div>
        </div>
    </section>
    <div class="content-container">
        <section class="filters-section">
            <div class="filters">
                <h3>Filter</h3>
                <input type="text" placeholder="Company, skill, tag..."><br><br>
                <div class="specialty">
                    <h4>Specialty</h4>
                    <select name="Specialty">
                        <option value="ux-researcher">UX Researcher</option>
                        <option value="qa">Quality Assurance</option>
                        <option value="senior-dev">Senior Dev</option>
                        <option value="project-designer">Project Designer</option>
                        <option value="sales">Sales</option>
                        <option value="project-manager">Project Manager</option>
                    </select>
                </div><br>
                <div class="employment">
                    <h4>Employment</h4>
                    <label><input type="checkbox" checked> Fulltime</label><br>
                    <label><input type="checkbox" checked> Senior level</label><br>
                    <label><input type="checkbox" checked> Remote</label><br>
                    <label><input type="checkbox"> Contract</label>
                </div><br>
                <div class="salary-type">
                    <h4>Salary Type</h4>
                </div>
            </div>
        </section>

        <section class="job-listings" id="jobListings"></section>
        <script src="script.js"></script>
        </section>
    </div>
</body>
</html>
