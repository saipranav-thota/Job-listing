<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Listings</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="Logo">
        </div>
        <nav>
            <ul>
                <li><a href="#">Find Jobs</a></li>
                <li><a href="#">Employers</a></li>
                <li><a href="#">Upload Job</a></li>
                <li><a href="#">About Us</a></li>
            </ul>
        </nav>
        <div class="user-profile">
            <span class="username">Emma R.</span>
            <span class="role">Quality Assurance</span>
            <img src="profile-pic.png" alt="Profile Picture">
        </div>
    </header>

    <section class="search-section">
        <h1>Find Your Dream Job Here</h1>
        <div class="search-container">
            <div class="search-bar">
                <div class="search-input">
                    <input type="text" placeholder="Job title or keyword">
                    <i class="fas fa-search"></i>
                </div>
                <div class="search-input">
                    <input type="text" placeholder="Add country or city">
                    <i class="fas fa-map-marker-alt"></i>
                </div>
                <button class="search-button">Search</button>
            </div>
        </div>
        <div class="tags">
            <button>Sales</button>
            <button>Fulltime</button>
            <button>Remote</button>
            <!-- Add more tags as needed -->
        </div>
    </section>
    <div class="content-container">
        <section class="filters-section">
            <div class="filters">
                <h3>Filter</h3>
                <input type="text" placeholder="Company, skill, tag...">
                <div class="specialty">
                    <h4>Specialty</h4>
                    <!-- Add specialty options here -->
                </div>
                <div class="employment">
                    <h4>Employment</h4>
                    <label><input type="checkbox" checked> Fulltime</label>
                    <label><input type="checkbox" checked> Senior level</label>
                    <label><input type="checkbox" checked> Remote</label>
                    <label><input type="checkbox"> Contract</label>
                </div>
                <div class="salary-type">
                    <h4>Salary Type</h4>
                    <!-- Add salary type options here -->
                </div>
            </div>
        </section>

        <section class="job-listings">
            <div class="job">
                <div class="job-details">
                    <div class="job-details-pos">
                        <div class="position">
                            <p>UX Researcher</p>
                        </div>
                        <div class="job-company">
                            <p>WebFlow</p>
                        </div>
                    </div>
                    <div class="job-details-details">
                        <span>Fulltime</span>
                        <span>Senior level</span>
                        <span>Remote</span>
                    </div>
                    <div class="job-details-location">
                        <p>California, CA</p>
                    </div>
                    <div class="job-timing">
                        <p>1 hour ago</p>
                    </div>
                    <div class="bookmark-container">
                        <button class="bookmark" id="bookmarkButton">
                            <img src="bookmark-outline-icon.png" alt="Bookmark" class="bookmark-icon" id="bookmarkIcon">
                        </button>
                    </div>
                    <script src="script.js"></script>
                </div>
            </div>

            <!-- Add more job listings as needed -->
        </section>
    </div>
</body>
</html>
