<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Voo</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background: url('background.jpg') no-repeat center center fixed; /* Replace with your image URL */
            background-size: cover; /* Make sure the background image covers the whole screen */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative; /* Added to position the logo */
        }

        .logo {
            position: absolute; /* Position the logo in the top left */
            top: 20px;
            left: 20px;
            height: 100px;
        }

        .container {
            max-width: 400px;
            padding: 20px;
            background-color: #F0F8FF; /* Light blue background for the container */
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.1);
            border-radius: 20px; /* Rounded corners */
            border: 2px solid #3333FF; /* Blue border around the container */
            position: relative;
        }

        h2 {
            font-weight: 700;
            color: #3333FF; /* Blue color for the heading */
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 500;
            color: #333; /* Dark color for labels */
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="password"] {
            width: calc(100% - 20px);
            padding: 10px;
            margin-top: 5px;
            font-size: 16px;
            border: 1px solid #3333FF; /* Blue border for input fields */
            border-radius: 15px; /* Rounded input fields */
            box-sizing: border-box;
            background-color: #FFFFFF; /* White background for input fields */
        }

        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #3333FF; /* Blue background for the button */
            color: white;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 15px; /* Rounded button */
            cursor: pointer;
            text-align: center;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .btn:hover {
            background-color: #001a66; /* Darker blue on hover */
            transform: scale(1.05); /* Slightly enlarge button on hover */
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }

        .link a {
            color: #3333FF; /* Blue color for links */
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .link a:hover {
            color: #001a66; /* Darker blue on hover */
        }
    </style>
</head>
<body>
    <img src="logo.png" alt="Voo Logo" class="logo"> <!-- Add your logo here -->
    <div class="container">
        <h2>Login to Your Account</h2>
        <form>
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button class="btn" type="submit">Login</button>
            <div class="link">
                <a href="#">Forgot Password?</a>
            </div>
            <div class="link">
                <a href="register.html">Join Now</a>
            </div>
        </form>
    </div>
</body>
</html>
